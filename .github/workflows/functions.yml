# =============================================================================
# functions.yml — Publish the tool + durable HITL Function Apps (Python v2).
#   agpoc-func-tools-dev    (tool execution)
#   agpoc-func-durable-dev  (durable HITL orchestration)
#
# AUTH: federated OIDC. Variables: AZURE_CLIENT_ID/TENANT_ID/SUBSCRIPTION_ID.
# Assumes the Function code lives under backend/functions/{tools,durable}.
# =============================================================================
name: functions

on:
  push:
    branches: [main]
    paths:
      - 'backend/functions/**'
      - '.github/workflows/functions.yml'
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: '3.11'
  TOOLS_APP: agpoc-func-tools-dev
  DURABLE_APP: agpoc-func-durable-dev

jobs:
  publish:
    name: Publish Function Apps
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      # Publish both apps; fail-fast off so one bad app doesn't block the other.
      fail-fast: false
      matrix:
        include:
          - app_name: agpoc-func-tools-dev
            src: backend/functions/tools
          - app_name: agpoc-func-durable-dev
            src: backend/functions/durable
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "${{ matrix.src }}/requirements.txt" ]; then
            pip install -r "${{ matrix.src }}/requirements.txt" \
              --target "${{ matrix.src }}/.python_packages/lib/site-packages"
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Publish ${{ matrix.app_name }}
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ matrix.app_name }}
          package: ${{ matrix.src }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true
