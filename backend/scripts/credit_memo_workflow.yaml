#
# SCBX UC1 - SME Credit Memo Drafting
# Sequential multi-agent orchestration: plan -> retrieve -> analyze -> bureau -> assemble.
# Human approval is required before any memo is finalized (enforced by memo-orchestrator).
#
# This is a Microsoft Agent Framework declarative workflow (CSDL YAML). It is
# registered as a Foundry workflow agent (definition.kind = "workflow") via
# provision_foundry_agents.py and surfaces in the portal Workflows (Preview) tab.
#
kind: Workflow
trigger:
  kind: OnConversationStart
  id: credit_memo_workflow
  actions:
    - kind: InvokeAzureAgent
      id: plan_memo
      displayName: Plan and coordinate
      conversationId: =System.ConversationId
      agent:
        name: memo-orchestrator
    - kind: InvokeAzureAgent
      id: retrieve_docs
      displayName: Retrieve grounded documents
      conversationId: =System.ConversationId
      agent:
        name: doc-retrieval
    - kind: InvokeAzureAgent
      id: analyze_ratios
      displayName: Interpret financial ratios
      conversationId: =System.ConversationId
      agent:
        name: financial-ratio
    - kind: InvokeAzureAgent
      id: summarize_bureau
      displayName: Summarize credit bureau
      conversationId: =System.ConversationId
      agent:
        name: bureau-summary
    - kind: InvokeAzureAgent
      id: assemble_memo
      displayName: Assemble draft memo
      conversationId: =System.ConversationId
      agent:
        name: memo-assembler
    # --- Human-in-the-loop approval gate -------------------------------------
    # No memo is finalized without a human decision. This action PAUSES the
    # workflow and waits for the reviewer's approve / reject response (delivered
    # via the configured channel, e.g. Teams). It mirrors the Durable Functions
    # 'wait_for_external_event' + Service Bus 'hitl-approvals' pause that the
    # Python memo-orchestrator enforces at runtime.
    - kind: Question
      id: human_approval
      displayName: Human approval (HITL)
      conversationId: =System.ConversationId
      variable: =Topic.ReviewerDecision
      prompt: >-
        Review the assembled draft credit memo and the policy-gate
        recommendation. Reply "approve" to finalize the memo, or "reject" to
        decline it. No memo is finalized without your decision.
    # --- Finalize only after the human decision ------------------------------
    - kind: InvokeAzureAgent
      id: finalize_memo
      displayName: Finalize or decline per human decision
      conversationId: =System.ConversationId
      agent:
        name: memo-orchestrator
      input:
        reviewer_decision: =Topic.ReviewerDecision
